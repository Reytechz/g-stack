name: Build & Release G-Stack

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release G-Stack
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build Go Daemon (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          go build -ldflags="-s -w" -o gstack .
        env:
          CGO_ENABLED: 0

      - name: Build Go Daemon (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          go build -ldflags="-s -w" -o gstack.exe .
        env:
          CGO_ENABLED: 0

      - name: Install Dependencies
        run: npm ci

      - name: Build & Publish Electron App
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
